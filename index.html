<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vancouver Peak Journey</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0b1220;
  color:white;
}

.hero{
  background:url('https://images.unsplash.com/photo-1501785888041-af3ef285b470') center/cover;
  height:40vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:32px;
  font-weight:bold;
}

.container{
  padding:20px;
}

.card{
  background:#111827;
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
}

button{
  background:#3b82f6;
  border:none;
  padding:10px 15px;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

input,select{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}
</style>
</head>

<body>

<div class="hero">
Vancouver Peak Journey
</div>

<div class="container">

<div class="card">
<h3>Sea to Sky Gondola - $125</h3>
<button onclick="openBooking('Sea to Sky',125)">Book</button>
</div>

<div class="card">
<h3>Grouse Mountain - $100</h3>
<button onclick="openBooking('Grouse',100)">Book</button>
</div>

<div class="card">
<h3>Whistler - $125</h3>
<label>
<input type="checkbox" id="extra"> Add Sea to Sky (+$100)
</label>
<br><br>
<button onclick="openBooking('Whistler',125)">Book</button>
</div>

</div>

<div id="booking" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000000cc;padding:20px">

<div class="card">
<h2 id="title"></h2>

<label>Date</label>
<input type="date" id="date">

<label>Time</label>
<select id="time">
<option>Morning</option>
<option>Afternoon</option>
<option>Evening</option>
</select>

<label>Guests</label>
<input type="number" id="guests" value="1" min="1" onchange="calc()">

<h3 id="price"></h3>

<button onclick="confirmBooking()">Confirm Booking</button>
<button onclick="closeBooking()">Close</button>

</div>

</div>

<script>
let base=0;

function openBooking(name,price){
  document.getElementById("booking").style.display="block";
  document.getElementById("title").innerText=name;
  base=price;
  calc();
}

function closeBooking(){
  document.getElementById("booking").style.display="none";
}

function calc(){
  let g=document.getElementById("guests").value;
  let extra=document.getElementById("extra")?.checked?100:0;
  let total=(base+extra)*g;
  document.getElementById("price").innerText="Total: $"+total;
}

function confirmBooking(){
  alert("Booking Confirmed ✅");
}
</script>

</body>
</html>
